<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="style.css"></head>
<body>

<h1>Poetry</h1>

<div id="stories"></div>
<button onclick="loadMore()">Load More</button>

<script>
let index = 0;
const videos = [
"https://www.youtube.com/embed/Myqe4JyNoLI",
"https://www.youtube.com/embed/YWC0AJ98iKU"
];

function loadMore(){
  for(let i=0;i<3;i++){
    if(index >= videos.length) return;
    const iframe = document.createElement("iframe");
    iframe.src = videos[index];
    iframe.loading = "lazy";
    iframe.style.width = "100%";
    iframe.style.height = "300px";
    document.getElementById("stories").appendChild(iframe);
    index++;
  }
}
loadMore();
</script>

</body>
</html>
